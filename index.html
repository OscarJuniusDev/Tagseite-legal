<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tagseite – Rechtliches</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            max-width: 720px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            color: #1a2a22;
            line-height: 1.7;
            background: #faf8f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        a { color: #3d7a5e; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }
        .subtitle {
            font-size: 15px;
            color: #5c6660;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 320px;
        }
        .links a {
            display: block;
            padding: 16px 20px;
            background: white;
            border: 1px solid #e0ddd6;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            color: #1a2a22;
            transition: border-color 0.15s;
        }
        .links a:hover {
            border-color: #3d7a5e;
            text-decoration: none;
        }
        .links a span {
            float: right;
            color: #9b9f98;
        }
    </style>
</head>
<body>
    <h1>Tagseite</h1>
    <p class="subtitle">Micro-Journaling App</p>
    <div class="links">
        <a href="datenschutz.html">Datenschutzerklärung <span>→</span></a>
        <a href="impressum.html">Impressum <span>→</span></a>
    </div>
</body>
</html>
